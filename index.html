<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>考研数学公式库</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
  onload="initKaTeX()"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#4a6cf7;--primary-light:#eef0ff;--primary-dark:#3451d1;
  --bg:#f7f8fc;--surface:#fff;--border:#e5e7ef;--text:#222;--text2:#666;--text3:#aaa;
  --success:#22c55e;--danger:#ef4444;--warn:#f59e0b;--info:#3b82f6;
  --radius:10px;
}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.app{display:flex;height:100vh;overflow:hidden;max-width:100vw}
.sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-width:0}
.logo{padding:18px 16px 12px;font-size:17px;font-weight:700;color:var(--primary);border-bottom:1px solid var(--border)}
.logo span{font-size:12px;color:var(--text3);font-weight:400;display:block;margin-top:2px}
.nav-section{padding:12px 10px 4px;font-size:11px;color:var(--text3);letter-spacing:.8px;font-weight:500}
.nav-section.main-sec{padding:14px 10px 4px;font-size:13px;color:var(--primary);font-weight:600}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 14px;cursor:pointer;border-radius:8px;margin:1px 6px;font-size:13px;color:var(--text2);transition:all .15s}
.nav-item:hover{background:var(--primary-light);color:var(--primary)}
.nav-item.active{background:var(--primary-light);color:var(--primary);font-weight:500}
.nav-item .icon{width:18px;text-align:center;font-size:14px}
.nav-badge{margin-left:auto;background:var(--primary);color:#fff;font-size:10px;padding:1px 6px;border-radius:10px}
.nav-count{margin-left:auto;font-size:11px;color:var(--text3)}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.header h1{font-size:17px;font-weight:600;white-space:nowrap}
.header-sub{font-size:13px;color:var(--text3);margin-left:auto}
.search-box{flex:1;max-width:340px;position:relative}
.search-box input{width:100%;padding:8px 14px 8px 44px;border:1px solid var(--border);border-radius:8px;font-size:13px;outline:none;background:var(--bg)}
.search-box input:focus{border-color:var(--primary);background:#fff}
.search-box .si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none;z-index:1}
.btn{padding:8px 16px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text2)}
.btn-outline:hover{border-color:var(--primary);color:var(--primary)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-icon{padding:7px;background:transparent;border:1px solid var(--border);color:var(--text2);border-radius:8px}
.btn-icon:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
.page{display:none;flex-direction:column;flex:1}
.page.active{display:flex}
.content{padding:20px 24px;flex:1}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-bottom:20px}
.cat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 8px;cursor:pointer;text-align:center;transition:all .15s}
.cat-card:hover,.cat-card.active{border-color:var(--primary);background:var(--primary-light)}
.cat-card .cat-icon{font-size:20px;margin-bottom:4px}
.cat-card .cat-name{font-size:12px;font-weight:500;color:var(--text)}
.cat-card .cat-count{font-size:10px;color:var(--text3);margin-top:2px}
.cat-card.main-cat{background:var(--primary-light);border-color:var(--primary)}
.cat-card.main-cat .cat-name{color:var(--primary);font-weight:600;font-size:13px}
.formula-grid{display:grid;gap:10px}
.formula-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;transition:border .15s}
.formula-card:hover{border-color:var(--primary)}
.formula-card.starred{border-left:3px solid var(--warn)}
.fc-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px}
.fc-name{font-size:13px;font-weight:600;color:var(--text)}
.fc-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:3px}
.tag{padding:2px 7px;border-radius:20px;font-size:10px;font-weight:500}
.tag-blue{background:#dbeafe;color:#1d4ed8}
.tag-green{background:#dcfce7;color:#166534}
.tag-orange{background:#ffedd5;color:#9a3412}
.tag-purple{background:#ede9fe;color:#5b21b6}
.tag-pink{background:#fce7f3;color:#9d174d}
.fc-formula{padding:10px 12px;background:var(--bg);border-radius:6px;margin:6px 0;overflow-x:auto;font-size:14px}
.fc-desc{font-size:12px;color:var(--text2);line-height:1.6;margin-top:4px}
.fc-actions{display:flex;gap:6px;margin-top:8px}
.q-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:12px;cursor:pointer;transition:border .15s}
.q-card:hover{border-color:var(--primary)}
.q-meta{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.q-source{font-size:12px;color:var(--text3)}
.q-difficulty{font-size:11px;padding:2px 8px;border-radius:20px}
.diff-easy{background:#dcfce7;color:#166534}
.diff-medium{background:#ffedd5;color:#9a3412}
.diff-hard{background:#fee2e2;color:#991b1b}
.q-body{font-size:14px;line-height:1.7;color:var(--text)}
.q-footer{display:flex;gap:8px;margin-top:10px;align-items:center;flex-wrap:wrap}
.review-badge{font-size:11px;color:var(--text3)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:14px;padding:24px;width:90%;max-width:600px;max-height:85vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.15)}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-header h2{font-size:17px;font-weight:600}
.close-btn{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text3);line-height:1}
label{display:block;font-size:13px;font-weight:500;color:var(--text2);margin-bottom:5px;margin-top:12px}
input[type=text],textarea,select{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;outline:none}
input[type=text]:focus,textarea:focus,select:focus{border-color:var(--primary)}
textarea{resize:vertical;min-height:80px}
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;text-align:center}
.stat-num{font-size:26px;font-weight:700;color:var(--primary)}
.stat-label{font-size:12px;color:var(--text3);margin-top:2px}
.review-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px;max-width:700px;margin:0 auto;text-align:center}
.review-question{font-size:16px;line-height:1.8;text-align:left;margin-bottom:20px}
.review-answer{background:var(--bg);border-radius:8px;padding:16px;text-align:left;display:none}
.review-answer.show{display:block}
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-icon{font-size:48px;margin-bottom:12px}
.toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;z-index:2000;opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.filter-btn{padding:5px 14px;border:1px solid var(--border);border-radius:20px;font-size:12px;cursor:pointer;background:var(--surface);color:var(--text2);transition:all .15s}
.filter-btn:hover,.filter-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.section-title{font-size:16px;font-weight:600;margin-bottom:14px;color:var(--text)}
.formula-preview{padding:8px 12px;background:var(--bg);border-radius:6px;margin:10px 0;overflow-x:auto;font-size:14px}
.katex-display{overflow-x:auto;overflow-y:hidden;max-width:100%}
.katex{font-size:1em}
.q-img{max-width:100%;border-radius:8px;margin:8px 0;border:1px solid var(--border)}
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);z-index:100;padding:6px 0 env(safe-area-inset-bottom,0)}
.mobile-nav-items{display:flex;justify-content:space-around;align-items:center}
.mobile-nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 12px;cursor:pointer;border-radius:8px;min-width:56px;color:var(--text3);font-size:11px;transition:color .15s}
.mobile-nav-item .mn-icon{font-size:20px;line-height:1}
.mobile-nav-item.active{color:var(--primary)}
@media(max-width:768px){
  .sidebar{display:none}
  .mobile-nav{display:block}
  .app{height:100svh}
  .main{padding-bottom:60px}
  .header{padding:10px 12px;gap:8px;flex-wrap:wrap}
  .header h1{font-size:15px}
  .search-box{flex:1 1 100%;max-width:100%;order:3}
  .header-sub{display:none}
  .content{padding:12px}
  .stats-bar{grid-template-columns:repeat(2,1fr)}
  .cat-grid{grid-template-columns:repeat(3,1fr)}
  .cat-card{padding:10px 6px}
  .cat-card .cat-name{font-size:11px}
  .formula-card{padding:12px}
  .fc-header{flex-direction:column;gap:4px}
  .fc-name{font-size:12px}
  .fc-formula{padding:8px 6px;font-size:13px;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .fc-actions{flex-wrap:wrap;gap:4px}
  .fc-tags{gap:3px}
  .tag{font-size:10px;padding:1px 6px}
  .review-card{padding:14px 12px}
  .review-question{font-size:14px}
  .modal{padding:16px 14px;width:96%;max-height:92vh;border-radius:12px}
  .modal-header h2{font-size:16px}
  .toast{bottom:72px;right:12px;left:12px;text-align:center}
  .btn{padding:7px 12px;font-size:13px}
  .btn-sm{padding:5px 10px;font-size:11px}
  .filter-bar{gap:5px}
  .filter-btn{padding:4px 10px;font-size:11px}
  .stat-card{padding:10px 8px}
  .stat-num{font-size:22px}
  .q-card{padding:12px}
  .q-body{font-size:13px}
  .katex{font-size:.88em!important}
  .katex-display{margin:.5em 0!important}
  .mobile-nav-item{padding:5px 8px;min-width:48px;font-size:10px}
  .mobile-nav-item .mn-icon{font-size:18px}
}
</style>
</head>
<body>

<div class="app">
  <div class="sidebar">
    <div class="logo">📐 考研数学
      <span>公式库 & 题库</span>
    </div>
    <div class="nav-section main-sec">📋 功能</div>
    <div class="nav-item active" onclick="showPage('formulas')"><span class="icon">📚</span><span>公式库</span></div>
    <div class="nav-item" onclick="showPage('questions')"><span class="icon">📝</span><span>我的题库</span><span class="nav-badge" id="qBadge">0</span></div>
    <div class="nav-item" onclick="showPage('review')"><span class="icon">🔁</span><span>复习模式</span></div>
    <div style="flex:1"></div>
    <div class="nav-section">设置</div>
    <div class="nav-item" onclick="showPage('settings')"><span class="icon">⚙️</span><span>数据管理</span></div>
  </div>

  <div class="main">
    <!-- 公式库 -->
    <div class="page active" id="page-formulas">
      <div class="header">
        <h1>📚 公式库</h1>
        <button class="btn btn-primary" onclick="openModal('addFormula')">＋</button>
        <div class="search-box">
          <span class="si">🔍</span>
          <input type="text" id="formulaSearch" placeholder="搜索公式…" oninput="filterFormulas()">
        </div>
        <span class="header-sub" id="formulaCount"></span>
      </div>
      <div class="content">
        <div class="cat-grid" id="catGrid"></div>
        <div class="filter-bar" id="filterBar"></div>
        <div class="section-title" id="formulaListTitle">全部公式</div>
        <div class="formula-grid" id="formulaList"></div>
      </div>
    </div>

    <!-- 题库 -->
    <div class="page" id="page-questions">
      <div class="header">
        <h1>📝 我的题库</h1>
        <button class="btn btn-primary" onclick="openModal('addQuestion')">＋</button>
        <div class="search-box">
          <span class="si">🔍</span>
          <input type="text" id="qSearch" placeholder="搜索题目…" oninput="filterQuestions()">
        </div>
      </div>
      <div class="content">
        <div class="stats-bar" id="statsBar"></div>
        <div class="filter-bar" id="qFilterBar">
          <button class="filter-btn active" onclick="setQFilter('all',this)">全部</button>
          <button class="filter-btn" onclick="setQFilter('easy',this)">简单</button>
          <button class="filter-btn" onclick="setQFilter('medium',this)">中等</button>
          <button class="filter-btn" onclick="setQFilter('hard',this)">困难</button>
          <button class="filter-btn" onclick="setQFilter('starred',this)">⭐ 收藏</button>
        </div>
        <div id="questionList"></div>
      </div>
    </div>

    <!-- 复习 -->
    <div class="page" id="page-review">
      <div class="header">
        <h1>🔁 复习模式</h1>
        <span class="header-sub" id="reviewProgress"></span>
      </div>
      <div class="content" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px">
        <div id="reviewArea"></div>
      </div>
    </div>

    <!-- 设置 -->
    <div class="page" id="page-settings">
      <div class="header"><h1>⚙️ 数据管理</h1></div>
      <div class="content">
        <div style="max-width:540px">
          <div class="formula-card" style="margin-bottom:16px">
            <div class="fc-name" style="margin-bottom:10px">📊 数据操作</div>
            <p style="font-size:13px;color:var(--text2);margin-bottom:12px">所有数据存储在浏览器本地（localStorage），清除浏览器数据会丢失</p>
            <div style="display:flex;gap:8px;flex-wrap:wrap">
              <button class="btn btn-outline btn-sm" onclick="exportData()">📤 导出数据</button>
              <button class="btn btn-outline btn-sm" onclick="document.getElementById('importFile').click()">📥 导入数据</button>
              <button class="btn btn-outline btn-sm" onclick="resetToDefault()">🔄 恢复默认公式</button>
              <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
            </div>
          </div>
          <div class="formula-card">
            <div class="fc-name" style="margin-bottom:10px">ℹ️ 关于</div>
            <p style="font-size:13px;color:var(--text2);line-height:1.7">考研数学公式库 v2.0<br>涵盖高等数学、线性代数、概率论与数理统计<br>公式使用 KaTeX 渲染，支持搜索、收藏、自定义添加</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 添加公式弹窗 -->
<div class="modal-overlay" id="modal-addFormula">
  <div class="modal">
    <div class="modal-header"><h2>添加公式</h2><button class="close-btn" onclick="closeModal('addFormula')">×</button></div>
    <label>公式名称 *</label>
    <input type="text" id="f-name" placeholder="如：分部积分公式">
    <label>分类 *</label>
    <select id="f-category" onchange="updateCategoryOptions()"></select>
    <label>LaTeX 公式 *（用 \\( 或 \\[ 包裹）</label>
    <textarea id="f-latex" placeholder="如：\[ \int u\,dv = uv - \int v\,du \]" oninput="previewFormula()"></textarea>
    <div id="f-preview" style="min-height:40px"></div>
    <label>描述说明</label>
    <textarea id="f-desc" placeholder="公式的适用条件、注意事项等"></textarea>
    <label>标签（逗号分隔）</label>
    <input type="text" id="f-tags" placeholder="积分,分部,技巧">
    <div style="margin-top:16px;display:flex;gap:8px">
      <button class="btn btn-primary" onclick="saveFormula()">保存</button>
      <button class="btn btn-outline" onclick="closeModal('addFormula')">取消</button>
    </div>
  </div>
</div>

<!-- 添加题目弹窗 -->
<div class="modal-overlay" id="modal-addQuestion">
  <div class="modal">
    <div class="modal-header"><h2>添加题目</h2><button class="close-btn" onclick="closeModal('addQuestion')">×</button></div>
    <label>题目来源</label>
    <input type="text" id="q-source" placeholder="如：2023年全国一卷第14题">
    <label>难度</label>
    <select id="q-difficulty"><option value="easy">简单</option><option value="medium">中等</option><option value="hard">困难</option></select>
    <label>题目内容 *（支持 LaTeX）</label>
    <textarea id="q-body" rows="4" placeholder="公式用 \(...\) 或 \[...\] 包裹" oninput="previewQuestion()"></textarea>
    <div id="q-preview" style="min-height:40px"></div>
    <label>答案/解析</label>
    <textarea id="q-answer" rows="4" placeholder="输入解题过程"></textarea>
    <label>上传图片（可选）</label>
    <input type="file" id="q-image" accept="image/*">
    <label>标签（逗号分隔）</label>
    <input type="text" id="q-tags" placeholder="积分,定积分,换元">
    <label>笔记</label>
    <textarea id="q-notes" rows="2" placeholder="个人备注"></textarea>
    <div style="margin-top:16px;display:flex;gap:8px">
      <button class="btn btn-primary" onclick="saveQuestion()">保存</button>
      <button class="btn btn-outline" onclick="closeModal('addQuestion')">取消</button>
    </div>
  </div>
</div>

<!-- 查看公式弹窗 -->
<div class="modal-overlay" id="modal-viewFormula">
  <div class="modal"><div class="modal-header"><h2 id="vf-title"></h2><button class="close-btn" onclick="closeModal('viewFormula')">×</button></div><div id="vf-body"></div></div>
</div>
<!-- 查看题目弹窗 -->
<div class="modal-overlay" id="modal-viewQuestion">
  <div class="modal"><div class="modal-header"><h2 id="vq-title"></h2><button class="close-btn" onclick="closeModal('viewQuestion')">×</button></div><div id="vq-body"></div></div>
</div>

<!-- 底部导航 -->
<div class="mobile-nav">
  <div class="mobile-nav-items">
    <div class="mobile-nav-item active" id="mn-formulas" onclick="showPage('formulas')"><span class="mn-icon">📚</span><span>公式</span></div>
    <div class="mobile-nav-item" id="mn-questions" onclick="showPage('questions')"><span class="mn-icon">📝</span><span>题库</span></div>
    <div class="mobile-nav-item" id="mn-review" onclick="showPage('review')"><span class="mn-icon">🔁</span><span>复习</span></div>
    <div class="mobile-nav-item" id="mn-settings" onclick="showPage('settings')"><span class="mn-icon">⚙️</span><span>设置</span></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ============ 分类体系 ============
const SECTIONS = [
  {id:'higher', name:'高等数学', icon:'📐'},
  {id:'linear', name:'线性代数', icon:'🔢'},
  {id:'prob',   name:'概率论', icon:'📊'}
];
const SUB_CATS = {
  higher:[
    {id:'limit',name:'极限',icon:'→'},
    {id:'derivative',name:'导数与微分',icon:'📈'},
    {id:'meanvalue',name:'中值定理',icon:'📏'},
    {id:'integral',name:'不定积分',icon:'∫'},
    {id:'definite',name:'定积分与应用',icon:'🔢'},
    {id:'multivar',name:'多元函数微分',icon:'∂'},
    {id:'multiintegral',name:'重积分',icon:'∬'},
    {id:'curvesurface',name:'曲线曲面积分',icon:'∮'},
    {id:'series',name:'无穷级数',icon:'Σ'},
    {id:'ode',name:'常微分方程',icon:'dy'}
  ],
  linear:[
    {id:'determinant',name:'行列式',icon:'||'},
    {id:'matrix',name:'矩阵',icon:'⊞'},
    {id:'vector',name:'向量',icon:'→'},
    {id:'lineareq',name:'线性方程组',icon:'≡'},
    {id:'eigenvalue',name:'特征值',icon:'λ'},
    {id:'quadratic',name:'二次型',icon:'Q'}
  ],
  prob:[

// ============ 状态 ============
let state={formulas:[],questions:[],activeCategory:'all',activeTag:'all',qFilter:'all',reviewIndex:0,reviewQueue:[],searchFormula:'',searchQuestion:''};

// ============ 存储 ============
function load(){
  try{
    const f=localStorage.getItem('ky_formulas_v2');
    const q=localStorage.getItem('ky_questions_v2');
    state.formulas=f?JSON.parse(f):JSON.parse(JSON.stringify(DEFAULT_FORMULAS));
    state.questions=q?JSON.parse(q):[];
  }catch(e){state.formulas=[...DEFAULT_FORMULAS];state.questions=[];}
}
function save(){
  localStorage.setItem('ky_formulas_v2',JSON.stringify(state.formulas));
  localStorage.setItem('ky_questions_v2',JSON.stringify(state.questions));
}

// ============ 渲染 ============
function renderAll(){renderCategories();renderFormulas();renderQuestions();updateBadge();renderStats();}

function renderCategories(){
  const counts={};state.formulas.forEach(f=>{counts[f.category]=(counts[f.category]||0)+1;});
  const el=document.getElementById('catGrid');
  let html=`<div class="cat-card main-cat ${state.activeCategory==='all'?'active':''}" onclick="setCat('all')"><div class="cat-icon">📋</div><div class="cat-name">全部</div><div class="cat-count">${state.formulas.length} 条</div></div>`;
  SECTIONS.forEach(sec=>{
    const subs=SUB_CATS[sec.id];
    const total=subs.reduce((s,c)=>s+(counts[c.id]||0),0);
    html+=`<div class="cat-card main-cat ${state.activeCategory===sec.id?'active':''}" onclick="setCat('${sec.id}')"><div class="cat-icon">${sec.icon}</div><div class="cat-name">${sec.name}</div><div class="cat-count">${total} 条</div></div>`;
  });
  // Show sub-cats if a section is selected
  if(state.activeCategory!=='all'&&!ALL_CATS[state.activeCategory]){
    const subs=SUB_CATS[state.activeCategory]||[];
    subs.forEach(c=>{
      html+=`<div class="cat-card ${state.activeCategory===c.id?'active':''}" onclick="setCat('${c.id}')"><div class="cat-icon">${c.icon}</div><div class="cat-name">${c.name}</div><div class="cat-count">${counts[c.id]||0} 条</div></div>`;
    });
  }
  el.innerHTML=html;
}

function getFilteredFormulas(){
  let list=state.formulas;
  if(state.activeCategory!=='all'){
    if(ALL_CATS[state.activeCategory]){list=list.filter(f=>f.category===state.activeCategory);}
    else{const subs=(SUB_CATS[state.activeCategory]||[]).map(c=>c.id);list=list.filter(f=>subs.includes(f.category));}
  }
  if(state.activeTag!=='all')list=list.filter(f=>f.tags&&f.tags.includes(state.activeTag));
  if(state.searchFormula){const q=state.searchFormula.toLowerCase();list=list.filter(f=>f.name.toLowerCase().includes(q)||(f.desc&&f.desc.toLowerCase().includes(q))||(f.tags&&f.tags.some(t=>t.toLowerCase().includes(q))));}
  return list;
}

function renderTagFilter(){
  const allTags=[...new Set(state.formulas.flatMap(f=>f.tags||[]))].sort();
  const bar=document.getElementById('filterBar');
  let html=`<span style="font-size:12px;color:var(--text2);margin-right:4px">标签：</span><button class="filter-btn ${state.activeTag==='all'?'active':''}" onclick="setTagFilter('all')">全部</button>`;
  allTags.slice(0,20).forEach(t=>{html+=`<button class="filter-btn ${state.activeTag===t?'active':''}" onclick="setTagFilter('${t}')">${t}</button>`;});
  bar.innerHTML=html;
}

function renderFormulas(){
  renderTagFilter();
  const list=getFilteredFormulas();
  document.getElementById('formulaCount').textContent=`${list.length} 条`;
  const title=document.getElementById('formulaListTitle');
  if(state.activeCategory==='all')title.textContent='全部公式';
  else if(ALL_CATS[state.activeCategory])title.textContent=ALL_CATS[state.activeCategory];
  else{const sec=SECTIONS.find(s=>s.id===state.activeCategory);title.textContent=sec?sec.name:'公式';}
  const el=document.getElementById('formulaList');
  if(!list.length){el.innerHTML='<div class="empty"><div class="empty-icon">🔍</div><p>没有找到匹配的公式</p></div>';return;}
  el.innerHTML=list.map(f=>`<div class="formula-card ${f.starred?'starred':''}" id="fc-${f.id}">
    <div class="fc-header"><div><div class="fc-name">${f.name}</div>
    <div class="fc-tags">${(f.tags||[]).map((t,i)=>`<span class="tag ${TAG_COLORS[i%TAG_COLORS.length]}">${t}</span>`).join('')}
    <span class="tag tag-blue">${ALL_CATS[f.category]||f.category}</span></div></div>
    <button class="btn-icon" title="${f.starred?'取消收藏':'收藏'}" onclick="toggleStar('${f.id}','formula')" style="font-size:16px;padding:4px 6px">${f.starred?'⭐':'☆'}</button></div>
    <div class="fc-formula">${f.latex}</div>
    ${f.desc?`<div class="fc-desc">${f.desc}</div>`:''}
    <div class="fc-actions"><button class="btn btn-outline btn-sm" onclick="viewFormula('${f.id}')">详情</button>
    <button class="btn btn-outline btn-sm" onclick="editFormula('${f.id}')">编辑</button>
    <button class="btn btn-outline btn-sm" style="color:var(--danger)" onclick="deleteFormula('${f.id}')">删除</button></div></div>`).join('');
  renderKaTeX();
}

function renderQuestions(){
  let list=state.questions;
  if(state.qFilter==='starred')list=list.filter(q=>q.starred);
  else if(state.qFilter!=='all')list=list.filter(q=>q.difficulty===state.qFilter);
  if(state.searchQuestion){const q=state.searchQuestion.toLowerCase();list=list.filter(i=>i.body.toLowerCase().includes(q)||(i.tags&&i.tags.some(t=>t.toLowerCase().includes(q)))||(i.source&&i.source.toLowerCase().includes(q)));}
  const el=document.getElementById('questionList');
  if(!list.length){el.innerHTML='<div class="empty"><div class="empty-icon">📝</div><p>还没有题目，点击右上角添加</p></div>';return;}
  el.innerHTML=list.map(q=>`<div class="q-card" onclick="viewQuestion('${q.id}')">
    <div class="q-meta"><span class="q-source">${q.source||'未知来源'}</span>
    <span class="q-difficulty diff-${q.difficulty}">${{easy:'简单',medium:'中等',hard:'困难'}[q.difficulty]}</span>
    ${(q.tags||[]).map((t,i)=>`<span class="tag ${TAG_COLORS[i%TAG_COLORS.length]}">${t}</span>`).join('')}
    ${q.starred?'<span style="margin-left:auto">⭐</span>':''}</div>
    <div class="q-body">${q.body.length>200?q.body.substring(0,200)+'…':q.body}</div>
    ${q.imageData?`<img class="q-img" src="${q.imageData}">`:''}
    <div class="q-footer"><span class="review-badge">复习 ${q.reviewCount||0} 次</span>
    ${q.lastReview?`<span class="review-badge">• ${q.lastReview}</span>`:''}
    <button class="btn btn-outline btn-sm" style="margin-left:auto" onclick="event.stopPropagation();quickReview('${q.id}')">复习</button>
    <button class="btn btn-outline btn-sm" style="color:var(--danger)" onclick="event.stopPropagation();deleteQuestion('${q.id}')">删除</button></div></div>`).join('');
  renderKaTeX();
}

function renderStats(){
  const t=state.questions.length,e=state.questions.filter(q=>q.difficulty==='easy').length,h=state.questions.filter(q=>q.difficulty==='hard').length,s=state.questions.filter(q=>q.starred).length;
  document.getElementById('statsBar').innerHTML=`<div class="stat-card"><div class="stat-num">${t}</div><div class="stat-label">全部</div></div><div class="stat-card"><div class="stat-num" style="color:var(--success)">${e}</div><div class="stat-label">简单</div></div><div class="stat-card"><div class="stat-num" style="color:var(--danger)">${h}</div><div class="stat-label">困难</div></div><div class="stat-card"><div class="stat-num" style="color:var(--warn)">${s}</div><div class="stat-label">收藏</div></div>`;
}

function renderReview(){
  const q=state.reviewQueue,el=document.getElementById('reviewArea');
  if(!q.length){el.innerHTML='<div class="empty"><div class="empty-icon">✅</div><p>题库为空</p><button class="btn btn-primary" style="margin-top:16px" onclick="showPage(\'questions\')">去添加</button></div>';document.getElementById('reviewProgress').textContent='';return;}
  const idx=state.reviewIndex%q.length,item=q[idx];
  document.getElementById('reviewProgress').textContent=`${idx+1} / ${q.length}`;
  el.innerHTML=`<div class="review-card"><div class="q-meta" style="justify-content:center;margin-bottom:16px"><span class="q-source">${item.source||''}</span><span class="q-difficulty diff-${item.difficulty}">${{easy:'简单',medium:'中等',hard:'困难'}[item.difficulty]}</span></div>
    <div class="review-question">${item.body}</div>${item.imageData?`<img class="q-img" src="${item.imageData}">`:''}
    <div style="display:flex;gap:10px;justify-content:center;margin:20px 0"><button class="btn btn-outline" onclick="showReviewAnswer()">查看答案</button><button class="btn btn-outline" onclick="nextReview()">下一题 →</button></div>
    <div class="review-answer" id="rq-answer"><strong>解析：</strong><br>${item.answer||'（暂无）'}${item.notes?`<br><br><strong>笔记：</strong><br>${item.notes}`:''}
    <div style="display:flex;gap:8px;margin-top:14px"><button class="btn btn-primary btn-sm" onclick="markReviewed('${item.id}')">✓ 已复习</button><button class="btn btn-outline btn-sm" onclick="toggleStar('${item.id}','question')">⭐ 收藏</button></div></div></div>`;
  renderKaTeX();
}

function renderKaTeX(){
  if(!window.renderMathInElement)return;
  try{document.querySelectorAll('.fc-formula,.review-question,.review-answer,.q-body,#vf-body,#vq-body,#f-preview,#q-preview').forEach(el=>{renderMathInElement(el,{delimiters:[{left:'\\[',right:'\\]',display:true},{left:'\\(',right:'\\)',display:false},{left:'$$',right:'$$',display:true}],throwOnError:false,ignoredTags:['script','noscript','style','textarea','option','pre']});});}catch(e){console.warn('KaTeX render error:',e);}
}
function initKaTeX(){try{renderKaTeX();}catch(e){console.warn('initKaTeX error:',e);}}

// ============ 操作 ============
const PAGES=['formulas','questions','review','settings'];
function showPage(p){
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.mobile-nav-item').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  const navs=document.querySelectorAll('.sidebar .nav-item');
  const idx=PAGES.indexOf(p);
  if(idx>=0&&navs[idx])navs[idx].classList.add('active');
  const mn=document.getElementById('mn-'+p);if(mn)mn.classList.add('active');
  if(p==='review'){state.reviewQueue=[...state.questions];state.reviewIndex=0;renderReview();}
}
function setCat(c){state.activeCategory=c;state.activeTag='all';renderCategories();renderFormulas();}
function setTagFilter(t){state.activeTag=t;renderFormulas();}
function filterFormulas(){state.searchFormula=document.getElementById('formulaSearch').value;renderFormulas();}
function setQFilter(f,el){state.qFilter=f;document.querySelectorAll('#qFilterBar .filter-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');renderQuestions();}
function filterQuestions(){state.searchQuestion=document.getElementById('qSearch').value;renderQuestions();}
function toggleStar(id,type){
  if(type==='formula'){const f=state.formulas.find(f=>f.id===id);if(f){f.starred=!f.starred;save();renderFormulas();}}
  else{const q=state.questions.find(q=>q.id===id);if(q){q.starred=!q.starred;save();renderQuestions();renderStats();}}
}
function updateBadge(){document.getElementById('qBadge').textContent=state.questions.length;}

// 公式 CRUD
function openModal(id){document.getElementById('modal-'+id).classList.add('open');}
function closeModal(id){document.getElementById('modal-'+id).classList.remove('open');}
let editingFormulaId=null;
function updateCategoryOptions(){
  const sel=document.getElementById('f-category');sel.innerHTML='';
  SECTIONS.forEach(sec=>{const og=document.createElement('optgroup');og.label=sec.name;
    SUB_CATS[sec.id].forEach(c=>{const o=document.createElement('option');o.value=c.id;o.textContent=c.name;og.appendChild(o);});
    sel.appendChild(og);});
}
function saveFormula(){
  const name=document.getElementById('f-name').value.trim(),latex=document.getElementById('f-latex').value.trim(),cat=document.getElementById('f-category').value;
  if(!name||!latex){showToast('请填写名称和公式');return;}
  const tags=document.getElementById('f-tags').value.split(',').map(t=>t.trim()).filter(Boolean),desc=document.getElementById('f-desc').value.trim();
  if(editingFormulaId){const f=state.formulas.find(f=>f.id===editingFormulaId);if(f)Object.assign(f,{name,category:cat,latex,desc,tags});}
  else{state.formulas.push({id:'f'+Date.now(),name,category:cat,latex,desc,tags,starred:false});}
  save();closeModal('addFormula');editingFormulaId=null;renderAll();showToast('公式已保存');
}
function editFormula(id){const f=state.formulas.find(f=>f.id===id);if(!f)return;editingFormulaId=id;
  document.getElementById('f-name').value=f.name;updateCategoryOptions();document.getElementById('f-category').value=f.category;
  document.getElementById('f-latex').value=f.latex;document.getElementById('f-desc').value=f.desc||'';
  document.getElementById('f-tags').value=(f.tags||[]).join(',');openModal('addFormula');setTimeout(()=>previewFormula(),100);}
function deleteFormula(id){if(!confirm('确认删除？'))return;state.formulas=state.formulas.filter(f=>f.id!==id);save();renderAll();showToast('已删除');}
function viewFormula(id){const f=state.formulas.find(f=>f.id===id);if(!f)return;
  document.getElementById('vf-title').textContent=f.name;
  document.getElementById('vf-body').innerHTML=`<div class="fc-tags" style="margin-bottom:10px">${(f.tags||[]).map((t,i)=>`<span class="tag ${TAG_COLORS[i%TAG_COLORS.length]}">${t}</span>`).join('')}<span class="tag tag-blue">${ALL_CATS[f.category]||f.category}</span></div><div class="fc-formula" style="font-size:17px;padding:16px">${f.latex}</div>${f.desc?`<p style="font-size:14px;color:var(--text2);margin-top:12px;line-height:1.7">${f.desc}</p>`:''}`;
  openModal('viewFormula');setTimeout(()=>renderKaTeX(),100);}
function previewFormula(){document.getElementById('f-preview').innerHTML='<div class="formula-preview">'+document.getElementById('f-latex').value+'</div>';setTimeout(()=>renderKaTeX(),50);}

// 题目 CRUD
let editingQuestionId=null;
function saveQuestion(){
  const body=document.getElementById('q-body').value.trim();if(!body){showToast('请填写题目');return;}
  const tags=document.getElementById('q-tags').value.split(',').map(t=>t.trim()).filter(Boolean);
  const processImage=(data)=>{const q={id:editingQuestionId||'q'+Date.now(),source:document.getElementById('q-source').value.trim(),difficulty:document.getElementById('q-difficulty').value,body,answer:document.getElementById('q-answer').value.trim(),tags,notes:document.getElementById('q-notes').value.trim(),imageData:data||null,starred:false,reviewCount:0,lastReview:null};
    if(editingQuestionId){const idx=state.questions.findIndex(x=>x.id===editingQuestionId);if(idx>=0)state.questions[idx]={...state.questions[idx],...q};}else{state.questions.push(q);}
    save();closeModal('addQuestion');editingQuestionId=null;renderAll();showToast('题目已保存');};
  const imgFile=document.getElementById('q-image').files[0];
  if(imgFile){const r=new FileReader();r.onload=e=>processImage(e.target.result);r.readAsDataURL(imgFile);}else{processImage(null);}
}
function viewQuestion(id){const q=state.questions.find(q=>q.id===id);if(!q)return;
  document.getElementById('vq-title').textContent=q.source||'题目';
  document.getElementById('vq-body').innerHTML=`<div class="q-meta" style="margin-bottom:12px"><span class="q-difficulty diff-${q.difficulty}">${{easy:'简单',medium:'中等',hard:'困难'}[q.difficulty]}</span>${(q.tags||[]).map((t,i)=>`<span class="tag ${TAG_COLORS[i%TAG_COLORS.length]}">${t}</span>`).join('')}</div>
    <div style="font-size:15px;line-height:1.8;margin-bottom:14px">${q.body}</div>${q.imageData?`<img class="q-img" src="${q.imageData}">`:''}
    ${q.answer?`<details style="margin-top:14px"><summary style="cursor:pointer;font-weight:500;color:var(--primary)">查看解析</summary><div style="padding:10px;background:var(--bg);border-radius:8px;margin-top:8px;font-size:14px;line-height:1.7">${q.answer}</div></details>`:''}
    ${q.notes?`<div style="margin-top:12px;padding:10px;background:#fffbeb;border:1px solid #fde68a;border-radius:8px;font-size:13px"><strong>📝 笔记：</strong>${q.notes}</div>`:''}
    <div style="margin-top:14px;display:flex;gap:8px"><button class="btn btn-primary btn-sm" onclick="markReviewed('${q.id}');closeModal('viewQuestion')">✓ 已复习</button><button class="btn btn-outline btn-sm" onclick="toggleStar('${q.id}','question');closeModal('viewQuestion')">${q.starred?'✩ 取消收藏':'⭐ 收藏'}</button></div>`;
  openModal('viewQuestion');setTimeout(()=>renderKaTeX(),100);}
function deleteQuestion(id){if(!confirm('确认删除？'))return;state.questions=state.questions.filter(q=>q.id!==id);save();renderAll();showToast('已删除');}
function markReviewed(id){const q=state.questions.find(q=>q.id===id);if(q){q.reviewCount=(q.reviewCount||0)+1;q.lastReview=new Date().toLocaleDateString('zh-CN');save();renderAll();showToast('已记录');}}
function quickReview(id){showPage('review');const idx=state.reviewQueue.findIndex(q=>q.id===id);if(idx>=0){state.reviewIndex=idx;renderReview();}}
function showReviewAnswer(){document.getElementById('rq-answer').classList.add('show');}
function nextReview(){state.reviewIndex++;if(state.reviewIndex>=state.reviewQueue.length){showToast('最后一题，从头开始');state.reviewIndex=0;}renderReview();}
function previewQuestion(){document.getElementById('q-preview').innerHTML='<div class="formula-preview">'+document.getElementById('q-body').value.substring(0,200)+'</div>';setTimeout(()=>renderKaTeX(),50);}

// 数据管理
function exportData(){const d={formulas:state.formulas,questions:state.questions,version:2,time:new Date().toISOString()};
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(d,null,2)],{type:'application/json'}));a.download='kaoyan-v2-'+new Date().toISOString().split('T')[0]+'.json';a.click();showToast('已导出');}
function importData(e){const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.formulas)state.formulas=d.formulas;if(d.questions)state.questions=d.questions;save();renderAll();showToast('导入成功');}catch(err){showToast('格式错误');}};r.readAsText(file);}
function resetToDefault(){if(!confirm('恢复默认公式？不影响自定义和题目。'))return;const ids=DEFAULT_FORMULAS.map(f=>f.id);state.formulas=state.formulas.filter(f=>!ids.includes(f.id));state.formulas=[...JSON.parse(JSON.stringify(DEFAULT_FORMULAS)),...state.formulas];save();renderAll();showToast('已恢复');}

let toastTimer;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2500);}

window.onclick=e=>{if(e.target.classList.contains('modal-overlay'))e.target.classList.remove('open');};
load();renderAll();
</script>
</body>
</html>
